name: Code Quality

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: 1.3.0-dev.${{ github.sha }}
    defaults:
      run:
        working-directory: Java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: Java/pom.xml
      - name: Verify build requirements and tests
        run: mvn --batch-mode --no-transfer-progress -Drevision="$BUILD_VERSION" verify
      - name: Check compile-scope dependency declarations
        run: mvn --batch-mode --no-transfer-progress -Drevision="$BUILD_VERSION" dependency:analyze -DignoreNonCompile=true -DfailOnWarning=true
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: Java/target/surefire-reports
          if-no-files-found: warn
          retention-days: 14
