name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: 1.3.0-dev.${{ github.sha }}
    defaults:
      run:
        working-directory: Java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: Java/pom.xml
      - name: Verify
        run: mvn --batch-mode --no-transfer-progress -Drevision="$BUILD_VERSION" verify
      - name: Prepare versioned artifact
        run: cp target/curriculo-editor.jar "target/curriculo-editor-${BUILD_VERSION}.jar"
      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: curriculo-editor-${{ github.sha }}
          path: Java/target/curriculo-editor-${{ env.BUILD_VERSION }}.jar
          if-no-files-found: error
          retention-days: 14
